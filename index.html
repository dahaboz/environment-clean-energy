<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🌿 البيئة وفوائد الطاقة النظيفة | ☀️ الطاقة الشمسية نموذجًا</title>

<style>
:root{
  --bg:#f4f9f6;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#475569;
  --brand:#15803d;
  --brand2:#16a34a;
  --line:#e2e8f0;
  --shadow:0 10px 25px rgba(0,0,0,.07);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:linear-gradient(180deg,#e6f4ea 0%,#f8fafc 60%);
  color:var(--text);
  scroll-behavior:smooth;
}

/* ✅ الشريط العلوي ثابت بالكامل */
header{
  background:rgba(255,255,255,.95);
  border-bottom:1px solid var(--line);
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
  backdrop-filter: blur(8px);
}

/* نعطي الصفحة مسافة حتى لا يختفي المحتوى خلف الهيدر */
body{
  padding-top:120px;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:14px 16px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:260px;
}

.logo{
  width:42px;height:42px;border-radius:12px;
  background: radial-gradient(circle at 30% 30%, #dbeafe, #60a5fa 45%, #16a34a 95%);
  box-shadow: var(--shadow);
}

h1{margin:0;font-size:20px}
.subtitle{margin:4px 0 0;font-size:13px;color:var(--muted)}

.tag{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 12px;
  border-radius:999px;
  font-size:12.5px;
  background:#ecfdf5;
  border:1px solid #bbf7d0;
}

nav{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

nav a{
  text-decoration:none;
  padding:7px 12px;
  border-radius:999px;
  font-size:13px;
  color:var(--text);
  transition:.25s ease;
}

nav a:hover{
  background:#dcfce7;
}

nav a.active{
  background:var(--brand2);
  color:#fff;
}

main{
  max-width:1100px;
  margin:auto;
  padding:18px 16px 70px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
  opacity:0;
  transform:translateY(16px);
  transition:.6s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,.12);
}

h2{margin:0 0 10px;font-size:20px}
p{margin:0;color:var(--muted);line-height:1.95}
ul,ol{margin:10px 0 0;padding:0 18px;color:var(--muted);line-height:1.95}

.grid{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.mini{
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);
}

.panel{
  margin-top:14px;
  padding:14px;
  border-radius:14px;
  border:1px solid #bbf7d0;
  background:linear-gradient(135deg,#f0fdf4,#eff6ff);
}

.warn{
  border-color:#fecaca;
  background:linear-gradient(135deg,#fff7ed,#fff1f2);
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
  border:1px solid var(--line);
}

th,td{
  border-bottom:1px solid var(--line);
  padding:10px;
  text-align:center;
}

.footer-box{
  margin-top:18px;
  padding:18px;
  background:linear-gradient(135deg,#e0f2fe,#f0fdf4);
  border:2px solid #16a34a;
  border-radius:15px;
  text-align:center;
  line-height:2;
}

footer{
  text-align:center;
  font-size:13px;
  color:var(--muted);
  margin-top:12px;
}

/* تحسين للجوال بدون تغيير المحتوى */
@media (max-width:600px){
  body{padding-top:140px;}
  .tag{display:none;}
  .grid{grid-template-columns:1fr;}
  nav{
    flex-wrap:nowrap;
    overflow-x:auto;
    gap:8px;
  }
  nav a{
    flex:0 0 auto;
    white-space:nowrap;
    background:#f8fafc;
    border:1px solid var(--line);
  }
}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>🌿 البيئة وفوائد الطاقة النظيفة</h1>
          <div class="subtitle">☀️ الطاقة الشمسية نموذجًا</div>
        </div>
      </div>
      <div class="tag">📘 مشروع مدرسي تعليمي</div>
    </div>

    <nav>
      <a href="#home">🏠 الرئيسية</a>
      <a href="#importance">🌍 أهمية البيئة</a>
      <a href="#pollution">🏭 التلوث</a>
      <a href="#clean">♻️ الطاقة النظيفة</a>
      <a href="#solar">☀️ الطاقة الشمسية</a>
      <a href="#benefits">✅ الفوائد</a>
      <a href="#ksa">🇸🇦 جهود المملكة</a>
      <a href="#tips">🌱 المحافظة على البيئة</a>
      <a href="#compare">📊 المقارنة</a>
      <a href="#refs">📚 المراجع</a>
    </nav>
  </div>
</header>

<!-- ⚠️ باقي المحتوى يبقى كما هو (لم يتم تغييره) -->

</body>
</html>
